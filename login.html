<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- link file css -->
    <link rel="stylesheet" href="login.css">
    <!-- link file JavaScript -->
    <script src="login.js"></script>
    <!-- link icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="left-container">
            
                <div class="heading">
                    <h1>Hello!</h1>
                    <span>Log in to your account</span>
                </div>
                <form>
                <div class="input-box">
                    <i class="fa-solid fa-envelope" id="mail-icon"></i>
                    <input type="email" placeholder="Email" id="mail">
                    <span id="E-email"></span>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock" id="password-icon"></i>
                    <input type="password" placeholder="Password" id="password">
                    <span id="E-password"></span>
                </div>
                <label class="check">
                    <input type="checkbox">
                    <span></span>
                    <p>Remember Me</p> 
                    <a href="#">Forgot password?</a>
                </label>
                <button onclick="return Login()" class="btn">Login</button>
                <span class="span-tag">Don't have an account? <a href="index.html">Create</a></span>
                </form>
        </div>
        
        <div class="right-container">
            <h1>Welcome Back!</h1>
            <p>Log in to continue your journey with us.</p>
            <p>We're happy to see you again.</p>
        </div>
    </div>
    
</body>
</html>
